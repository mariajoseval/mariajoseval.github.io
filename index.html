<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maria José Valderrama</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:#111;
animation:fadeIn 1.2s ease;
}

.container{
max-width:700px;
padding:40px;
}

h1{
font-size:46px;
margin-bottom:10px;
font-weight:700;
}

.subtitle{
font-size:22px;
color:#ff6694;
font-weight:600;
margin-bottom:20px;
}

.description{
font-size:18px;
color:#555;
line-height:1.6;
margin-bottom:35px;
}

.divider{
width:90px;
height:2px;
background:#ff6694;
margin:30px auto;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

a{
text-decoration:none;
}

.btn-email{
border:2px solid #ff6694;
color:#ff6694;
padding:14px 26px;
border-radius:30px;
font-weight:600;
transition:all .25s ease;
}

.btn-email:hover{
background:#ff6694;
color:white;
}

.btn-portfolio{
background:#ff6694;
color:white;
padding:14px 26px;
border-radius:30px;
font-weight:600;
transition:all .25s ease;
box-shadow:0 6px 18px rgba(255,102,148,0.35);
}

.btn-portfolio:hover{
transform:translateY(-3px);
box-shadow:0 10px 28px rgba(255,102,148,0.5);
}

footer{
margin-top:40px;
font-size:14px;
color:#888;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1>Maria José Valderrama</h1>

<div class="subtitle">
Community Manager
</div>

<div class="divider"></div>

<p class="description">
Experienced in social media management, creative direction and copywriting for engaging digital content.
</p>

<div class="buttons">

<a href="https://mail.google.com/mail/?view=cm&fs=1&to=mariajova02@gmail.com" class="btn-email" target="_blank">
Email Me
</a>

<a href="https://mariajoseval.my.canva.site/" class="btn-portfolio" target="_blank">
View Portfolio
</a>

</div>

<footer>
© 2026 Maria José Valderrama
</footer>

</div>

</body>
</html>
